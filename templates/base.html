<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca CEJAEG</title>
<style>
:root {
  --bg: #f4f6fb;
  --surface: #fff;
  --border: #e4e8f0;
  --border2: #d0d6e4;
  --text: #1a1e2e;
  --text2: #5a6278;
  --text3: #9aa0b4;
  --blue: #1d6fce;
  --blue-hover: #1a62b8;
  --blue-light: #e8f0fb;
  --blue-mid: #c3d8f7;
  --green-bg: #f0fdf4;
  --green: #16a34a;
  --green-bd: #bbf7d0;
  --red-bg: #fef2f2;
  --red: #dc2626;
  --red-bd: #fecaca;
  --amber-bg: #fffbeb;
  --amber: #d97706;
  --amber-bd: #fde68a;
  --row-hover: #f8fafd;
  --sidebar-active: #e8f0fb;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
}

[data-theme="dark"] {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2e3d;
  --border2: #363a50;
  --text: #e8eaf2;
  --text2: #9aa0b8;
  --text3: #5a6080;
  --blue: #4a90e2;
  --blue-hover: #5a9de8;
  --blue-light: #1a2540;
  --blue-mid: #1e3060;
  --green-bg: #0d2018;
  --green: #4ade80;
  --green-bd: #166534;
  --red-bg: #200f0f;
  --red: #f87171;
  --red-bd: #7f1d1d;
  --amber-bg: #1f1500;
  --amber: #fbbf24;
  --amber-bd: #78350f;
  --row-hover: #1f2235;
  --sidebar-active: #1a2540;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  transition: background 0.2s, color 0.2s;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; }

/* ── SIDEBAR ── */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  z-index: 100;
  transition: transform 0.25s ease;
  box-shadow: var(--shadow);
}

.logo {
  padding: 1.5rem 1rem 1rem;
  border-bottom: 1px solid var(--border);
}

.logo-top {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}

.logo-text h1 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin: 0;
}

.logo-text p {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.cejaeg-badge {
  margin-top: 12px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  border-radius: 6px;
  padding: 4px 10px;
}

.cejaeg-badge span {
  font-size: 10px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.03em;
}

nav {
  flex: 1;
  padding: 0.5rem 0;
  overflow-y: auto;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 1.25rem;
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.15s ease;
  border-left: 3px solid transparent;
}

.nav-link:hover {
  background: var(--row-hover);
  color: var(--text);
}

.nav-link.active {
  background: var(--sidebar-active);
  color: var(--blue);
  border-left-color: var(--blue);
}

.nav-link svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.6;
}

.nav-link.active svg {
  opacity: 1;
}

.sidebar-footer {
  padding: 1.25rem;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--text3);
}

.sidebar-footer span {
  font-weight: 600;
  color: var(--text);
  display: block;
  margin-bottom: 2px;
}

.sidebar-footer small {
  font-size: 11px;
  opacity: 0.8;
}

.sidebar-footer a {
  color: var(--text3);
  font-size: 12px;
  margin-top: 8px;
  display: inline-block;
}

.sidebar-footer a:hover {
  color: var(--red);
}

/* ── TOPBAR ── */
.topbar {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 64px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 101;
  align-items: center;
  padding: 0 1.25rem;
  gap: 12px;
  box-shadow: var(--shadow);
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.topbar-logo h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin: 0;
}

.menu-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text);
  padding: 8px;
  display: flex;
  align-items: center;
  border-radius: 8px;
  transition: background 0.15s;
}

.menu-btn:hover {
  background: var(--row-hover);
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
  backdrop-filter: blur(2px);
}

/* ── MAIN ── */
.main {
  margin-left: 240px;
  flex: 1;
  padding: 2rem;
  max-width: 1200px;
  margin: 2rem auto;
  min-height: 100vh;
}

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 12px;
}

.page-header h2 {
  font-size: 24px;
  font-weight: 700;
  margin: 0;
}

.page-header p {
  font-size: 14px;
  color: var(--text2);
}

/* ── THEME TOGGLE ── */
.theme-toggle {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.theme-toggle:hover {
  border-color: var(--blue);
  color: var(--blue);
  box-shadow: var(--shadow);
}

/* ── BOTONES ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
  box-shadow: var(--shadow-sm);
}

.btn:hover {
  background: var(--bg);
  border-color: var(--border2);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.btn-primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}

.btn-primary:hover {
  background: var(--blue-hover);
  border-color: var(--blue-hover);
}

.btn-danger {
  background: var(--red-bg);
  color: var(--red);
  border-color: var(--red-bd);
}

.btn-green {
  background: var(--green-bg);
  color: var(--green);
  border-color: var(--green-bd);
}

.btn-sm {
  padding: 6px 14px;
  font-size: 12px;
}

/* ── CARDS Y TABLAS ── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem 1rem;
  text-align: center;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.metric:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.metric-val {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 4px;
}

.metric-lbl {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
}

.card:hover {
  box-shadow: var(--shadow);
}

.card-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th {
  text-align: left;
  padding: 12px 16px;
  font-weight: 600;
  color: var(--text2);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  font-size: 13px;
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tr:hover td {
  background: var(--row-hover);
}

/* ── BADGES Y FLASH ── */
.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 600;
}

.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-light); color: var(--blue); }

.flash {
  padding: 1rem 1.25rem;
  border-radius: 10px;
  margin-bottom: 1.5rem;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid;
  box-shadow: var(--shadow-sm);
}

.flash.error {
  background: var(--red-bg);
  color: var(--red);
  border-color: var(--red-bd);
}

/* ── FORMULARIOS ── */
.search-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.search-bar input,
.search-bar select {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  background: var(--surface);
  color: var(--text);
  transition: all 0.15s ease;
  min-height: 44px;
}

.search-bar input {
  flex: 1;
  min-width: 200px;
}

.search-bar input:focus,
.search-bar select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(29,111,206,0.1);
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 8px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  max-width: 700px;
  margin: 0 auto;
  box-shadow: var(--shadow);
}

.form-actions {
  display: flex;
  gap: 12px;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  justify-content: flex-end;
}

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .main {
    margin-left: 240px;
    padding: 1.5rem;
  }
}

@media (max-width: 768px) {
  .topbar { display: flex; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .overlay.open { display: block; }
  
  .main {
    margin-left: 0;
    padding: 1rem;
    padding-top: 80px;
    max-width: 100%;
  }
  
  .page-header h2 {
    font-size: 20px;
  }
  
  .cards {
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
  }
  
  .metric-val { font-size: 26px; }
  
  .form-row,
  .two-col {
    grid-template-columns: 1fr;
  }
  
  .form-card {
    padding: 1.5rem;
    margin: 0;
  }
  
  table {
    font-size: 13px;
    overflow-x: auto;
    display: block;
    white-space: nowrap;
  }
  
  th, td {
    padding: 10px 12px;
  }
  
  .search-bar input {
    min-width: 100%;
  }
}

@media (max-width: 480px) {
  .topbar {
    padding: 0 1rem;
    height: 60px;
  }
  
  .topbar-logo h1 {
    font-size: 15px;
  }
  
  .main {
    padding: 0.75rem;
    padding-top: 75px;
  }
  
  .cards {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  
  .metric {
    padding: 1.25rem 0.75rem;
  }
  
  .metric-val { font-size: 22px; }
  
  .form-card {
    padding: 1.25rem;
  }
  
  .btn {
    padding: 10px 16px;
    font-size: 14px;
    width: 100%;
    justify-content: center;
  }
  
  .form-actions {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
