<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<title>Biblioteca CEJAEG — Iniciar sesión</title>
<style>
:root{--bg:#f4f6fb;--surface:#fff;--border:#e4e8f0;--text:#1a1e2e;--text2:#5a6278;--text3:#9aa0b4;--blue:#1d6fce;--blue-hover:#1a62b8;--blue-light:#e8f0fb;--blue-mid:#c3d8f7;--red-bg:#fef2f2;--red:#dc2626;--red-bd:#fecaca;}
[data-theme="dark"]{--bg:#0f1117;--surface:#1a1d27;--border:#2a2e3d;--text:#e8eaf2;--text2:#9aa0b8;--text3:#5a6080;--blue:#4a90e2;--blue-hover:#5a9de8;--blue-light:#1a2540;--blue-mid:#1e3060;--red-bg:#200f0f;--red:#f87171;--red-bd:#7f1d1d;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;transition:background .2s}
.wrap{display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.brand{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.brand-icon{width:52px;height:52px}
.brand h1{font-size:18px;font-weight:700;color:var(--text)}
.brand p{font-size:12px;color:var(--text3)}
.cejaeg{display:inline-flex;align-items:center;gap:5px;background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:6px;padding:3px 10px;margin-top:2px}
.cejaeg span{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.06em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem;width:340px}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:1rem;background:var(--surface);color:var(--text);transition:.15s}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,111,206,.12)}
button{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s}
button:hover{background:var(--blue-hover)}
.error{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);padding:.6rem .9rem;border-radius:8px;font-size:13px;margin-bottom:1rem}
.theme-toggle{position:fixed;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 10px;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;transition:.2s}
.theme-toggle:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
  <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="icon-moon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="icon-sun" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <span id="theme-label">Modo oscuro</span>
</button>

<div class="wrap">
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="52" rx="14" fill="#1d6fce"/>
      <path d="M12 39C12 37.34 13.34 36 15 36H40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M15 13H40v26H15A3 3 0 0112 36V16a3 3 0 013-3z" stroke="white" stroke-width="2.2"/>
      <line x1="18" y1="21" x2="34" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="18" y1="27" x2="29" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1>Biblioteca Escolar</h1>
    <div class="cejaeg">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:#1d6fce"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span>CEJAEG</span>
    </div>
  </div>

  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="post">
      <label>Usuario</label>
      <input name="usuario" autofocus placeholder="admin">
      <label>Contraseña</label>
      <input name="password" type="password" placeholder="••••••••">
      <button type="submit">Entrar</button>
    </form>
  </div>
</div>

<script>
const html = document.documentElement;
const saved = localStorage.getItem('tema') || 'light';
setTheme(saved);
function setTheme(t){
  html.setAttribute('data-theme', t);
  localStorage.setItem('tema', t);
  document.getElementById('theme-label').textContent = t==='dark' ? 'Modo claro' : 'Modo oscuro';
  document.getElementById('icon-moon').style.display = t==='dark' ? 'none' : '';
  document.getElementById('icon-sun').style.display  = t==='dark' ? '' : 'none';
}
function toggleTheme(){
  setTheme(html.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
}
</script>
</body>
</html>
