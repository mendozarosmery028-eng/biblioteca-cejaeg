{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div>
    <h2>{{ 'Editar usuario' if u else 'Nuevo usuario' }}</h2>
  </div>
  <a href="{{ url_for('usuarios') }}" class="btn">← Volver</a>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-group">
      <label>Nombre completo</label>
      <input name="nombre" required value="{{ u.nombre if u else '' }}" placeholder="Ej: María López">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Usuario (login)</label>
        <input name="usuario" required value="{{ u.usuario if u else '' }}" placeholder="Ej: mlopez">
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select name="rol">
          <option value="encargado" {% if not u or u.rol == 'encargado' %}selected{% endif %}>Encargado</option>
          <option value="admin" {% if u and u.rol == 'admin' %}selected{% endif %}>Admin</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Contraseña {% if u %}<span style="color:var(--text3);font-weight:400">(dejar vacío para no cambiar)</span>{% endif %}</label>
      <input name="password" type="password" {% if not u %}required{% endif %} placeholder="••••••••">
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">{{ 'Guardar cambios' if u else 'Crear usuario' }}</button>
      <a href="{{ url_for('usuarios') }}" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
