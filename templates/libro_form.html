{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div><h2>Agregar libro</h2><p>Registra un nuevo título y sus ejemplares físicos</p></div>
  <a href="{{ url_for('libros') }}" class="btn">← Volver</a>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label>Título *</label>
        <input name="titulo" required placeholder="Ej. Biología 10">
      </div>
      <div class="form-group">
        <label>Autor *</label>
        <input name="autor" required placeholder="Ej. Campbell & Reece">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoría</label>
        <select name="categoria">
          <option value="">Sin categoría</option>
          <option>Ciencias</option>
          <option>Literatura</option>
          <option>Historia</option>
          <option>Matemáticas</option>
          <option>Arte</option>
          <option>Referencia</option>
          <option>Idiomas</option>
          <option>Tecnología</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>ISBN</label>
        <input name="isbn" placeholder="Ej. 978-0321775658">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Año de publicación</label>
        <input name="anio" type="number" placeholder="Ej. 2020">
      </div>
      <div class="form-group">
        <label>Cantidad de ejemplares físicos *</label>
        <input name="cantidad" type="number" value="1" min="1" max="100" required>
        <p style="font-size:11px;color:#888;margin-top:4px">Se crearán Ejemplar #1, #2... hasta la cantidad indicada</p>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar libro</button>
      <a href="{{ url_for('libros') }}" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
